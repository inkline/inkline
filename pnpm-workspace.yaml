packages:
  - apps/*
  - core/*
  - tooling/*
  - ui/*
  - tools/*
allowBuilds:
  "@parcel/watcher": true
  core-js: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  sharp: true

# pnpm 11 enforces a default minimumReleaseAge (24h) supply-chain guard.
# Exclude the styleframe first-party ecosystem (intentionally fresh, trusted),
# and pin the exact versions of unrelated transitive deps caught as collateral
# so the guard still applies to any future releases of those packages.
minimumReleaseAgeExclude:
  - "@styleframe/*"
  - styleframe
  - ansis@4.3.1
  - js-yaml@4.2.0
  - launch-editor@2.14.1

catalog:
  "@analogjs/storybook-angular": ^2.5.1
  "@analogjs/vite-plugin-angular": ^2.5.1
  "@angular-eslint/eslint-plugin": ^21.4.0
