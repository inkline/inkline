  "@angular/build": ^21.2.11
  "@angular/cli": ^21
  "@angular/compiler": ^21.2.13
  "@angular/compiler-cli": ^21.2.13
  "@angular/core": ^21
  "@angular/platform-browser": ^21
  "@angular/platform-browser-dynamic": ^21
  "@angular/platform-server": ^21
  "@storybook-astro/framework": ^1.2.0
  "@storybook/addon-a11y": ^10
  "@storybook/addon-docs": ^10
  "@storybook/angular": ^10
  "@storybook/react-vite": ^10
  "@storybook/svelte-vite": ^10
  "@storybook/vue3-vite": ^10
  "@styleframe/cli": ^4.1.0
  "@styleframe/core": ^3.6.0
  "@styleframe/license": ^2.0.2
  "@styleframe/loader": ^3.0.2
  "@styleframe/plugin": ^3.4.0
  "@styleframe/runtime": ^3.2.0
  "@styleframe/theme": ^3.7.1
  "@styleframe/transpiler": ^3.4.0
  "@sveltejs/vite-plugin-svelte": ^7.1.2
  "@tsdown/css": ^0.22.0
  "@types/node": ^24
  "@typescript-eslint/parser": ^8.59.3
  "@vitejs/plugin-react": ^6.0.2
  "@vitejs/plugin-vue": ^6.0.7
