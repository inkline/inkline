name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: 22

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          retention-days: 1
          include-hidden-files: true
          path: |
            core/core/dist
            core/compiler/dist
            core/config-loader/dist
            core/inkline/dist
            core/plugin/dist
            tooling/cli/dist
            tooling/storybook/dist
            tooling/test-utils/dist
            ui/*/.inkline
            ui/*/.styleframe

  build-storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Build storybook
        run: pnpm --filter @inkline/storybook-app run storybook:build
        env:
          NODE_ENV: production

      - name: Upload storybook build
        uses: actions/upload-artifact@v4
        with:
          name: storybook-build
          path: apps/storybook/dist
          retention-days: 1

  build-website:
    name: Build Website
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Build website
        run: pnpm --filter website run build
        env:
          NODE_ENV: production

      - name: Upload website build
        uses: actions/upload-artifact@v4
        with:
          name: website-build
          path: apps/website/dist
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Run oxlint
        run: npx vp lint

      - name: Check formatting
        run: npx vp fmt --check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Run type checking
        run: npx vp check --no-fmt --no-lint

  test:
    name: Unit Tests (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Run tests
        # Each shard runs only part of the suite, so per-package coverage is partial. Disable the
        # 100% coverage thresholds for the sharded run (Codecov merges the two shard uploads); the
        # gate still applies to full local `vp test --coverage` runs. A CLI flag is used rather than
        # an env var because `vp run` executes tasks in a clean environment that strips ad-hoc vars.
        run: >-
          pnpm run test --
          --coverage --shard=${{ matrix.shard }}/2 --passWithNoTests
          --coverage.thresholds.lines=0 --coverage.thresholds.branches=0
          --coverage.thresholds.functions=0 --coverage.thresholds.statements=0
        env:
          NODE_ENV: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          flags: shard-${{ matrix.shard }}

  visual-parity:
    name: Visual Parity (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: build
    # Blocking: listed in `ci-success.needs` below. Parity is green and deterministic across all seven
    # targets, so a diff here is a real regression and fails the pipeline. The uploaded Playwright report
    # + diff images remain available as artifacts for triage.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The composition Storybook runs in dev mode, where each framework package is aliased to its
      # generated `.inkline` source (tooling/storybook preset) — so the build artifact's `ui/*/.inkline`
      # + `.styleframe` is all that's needed; `ui/*/dist` is not.
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Install Playwright Chromium
        run: pnpm --filter @inkline/e2e exec playwright install --with-deps chromium

      # No NODE_ENV=production: the per-framework dev servers must keep the source alias active.
      - name: Run visual parity tests
        run: pnpm --filter @inkline/e2e run test:e2e
        env:
          STORY_SHARD: ${{ matrix.shard }}/2

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-parity-report-shard-${{ matrix.shard }}
          path: |
            testing/e2e/playwright-report
            testing/e2e/test-results
          retention-days: 7

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [build, build-storybook, build-website, lint, typecheck, test, visual-parity]
    if: always()
    steps:
      - name: Check job status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi
